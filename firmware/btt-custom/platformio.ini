; PlatformIO Project Configuration File
; Suzuki GSX-R1000 SDS ECU Diagnostic Tool
; Target: BIGTREETECH TFT35 V3.0 (STM32F207VCT6)
; Flash offset: 0x08008000 (32KB bootloader at 0x08000000)

[platformio]
src_dir      = src
boards_dir   = buildroot/boards
default_envs = BIGTREE_TFT35_V3_0

[common_stm32]
platform        = ststm32
framework       = cmsis
upload_protocol = stlink
debug_tool      = stlink

[env:BIGTREE_TFT35_V3_0]
extends           = common_stm32
board             = STM32F207VC_0x8000
build_src_filter  = +<.>
                    -<Libraries>
                    +<Libraries/cmsis/stm32f2xx>
                    +<Libraries/fwlib/stm32f2xx>
                    +<Libraries/Startup/stm32f2xx>
                    -<User/Hal/stm32f10x>  -<User/Hal/gd32f20x>  -<User/Hal/gd32f30x>
                    -<User/Hal/STM32_USB_HOST_Library> -<User/Hal/STM32_USB_OTG_Driver/>
                    -<User/Hal/GD32F20x_usbfs_library> -<User/Hal/GD32F30x_usbfs_library>
                    -<User/Hal/LCD_Driver/SSD1963.*>
                    -<User/Hal/LCD_Driver/HX8558.*> -<User/Hal/LCD_Driver/RM68042.*>
                    -<User/Hal/LCD_Driver/ILI9341.*> -<User/Hal/LCD_Driver/ILI9325.*>
                    -<User/Hal/LCD_Driver/ST7789.*> -<User/Hal/LCD_Driver/ST7796S.*>
                    -<User/Fatfs/myfatfs.*> -<User/Fatfs/ffunicode.*> -<User/Fatfs/diskio.*>
                    -<User/Hal/HD44780.*> -<User/Hal/Knob_LED.*> -<User/Hal/LCD_Encoder.*>
                    -<User/Hal/buzzer.*>
                    -<User/Hal/w25qxx.*>
                    -<User/Hal/stm32f2_f4xx/spi_slave.*> -<User/Hal/stm32f2_f4xx/i2c_eeprom.*>
extra_scripts    = pre:buildroot/scripts/pre_install_dependencies.py
                   pre:buildroot/scripts/custom_filename.py
                   buildroot/scripts/stm32f2xxxC_0x8000_iap.py
build_flags      = -fmax-errors=5
                   -g
                   -ggdb
                   -Wno-missing-braces
                   -DUSE_STDPERIPH_DRIVER=
                   -DSTM32F2XX=
                   -DHSE_VALUE=8000000ul
                   -DVECT_TAB_FLASH=0x08008000
                   -DRAM_SIZE=96
                   -DHARDWARE="SUZUKI_ECU_TOOL_V1"
                   -DHARDWARE_SHORT="SET01"
                   -DTFT35_V3_0=
                   -DSOFTWARE_VERSION=1.x
                   -DSOFTWARE_VERSION_SHORT=1
                   -Isrc/User/Fatfs
                   -Isrc/User/Hal
                   -Isrc/User/Variants
                    -Isrc/User
                    -Isrc/User/SD_Logger
                    -Isrc/User/Hal
                   -Isrc/Libraries/cmsis/Core-CM3
                   -Isrc/Libraries/cmsis/stm32f2xx
                   -Isrc/Libraries/fwlib/stm32f2xx
                   -Isrc/Libraries/fwlib/stm32f2xx/inc
                   -Isrc/User/Hal/stm32f2_f4xx
